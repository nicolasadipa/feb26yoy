<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Adipa - Ene-Feb 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <style>
        body { margin: 0; background-color: #13152a; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

        const COLORS = {
            lavender: "#cec8e0", navy: "#1b2040", purple: "#8b5cf6", cyan: "#22c3f0",
            darkPurple: "#6b5b8d", lightGray: "#e8e6ec", y2025: "#6b5b8d", y2026: "#8b5cf6",
            positive: "#34d399", negative: "#f87171", bg: "#13152a", card: "#1c1f3a",
            text: "#eae8f0", textMuted: "#9994b0", border: "#2e2b4a", accent: "#8b5cf6",
            sync: "#22c3f0", async: "#f59e0b"
        };

        // Copia exacta de tus datos del archivo .jsx
        const PROGRAM_TYPES = ["Curso Sincrónico", "Curso Asincrónico", "Acreditación Internacional", "Sesiones Magistrales", "Especialización", "Diplomado", "Postítulo"];
        const MODALIDAD_MAP = { "Curso Sincrónico": "Sincrónico", "Curso Asincrónico": "Asincrónico", "Acreditación Internacional": "Sincrónico", "Sesiones Magistrales": "Asincrónico", "Especialización": "Asincrónico", "Diplomado": "Sincrónico", "Postítulo": "Sincrónico" };
        const COUNTRIES = ["Chile", "México", "Colombia"];
        
        const programData = {
            "Curso Sincrónico": {
                clientes: [{ country: "Chile", t2025: 1200, t2026: 1400, n2025: 520, n2026: 650, r2025: 680, r2026: 750 }, { country: "México", t2025: 320, t2026: 470, n2025: 200, n2026: 300, r2025: 120, r2026: 170 }, { country: "Colombia", t2025: 230, t2026: 330, n2025: 140, n2026: 210, r2025: 90, r2026: 120 }],
                ventas: [{ country: "Chile", monto2025: 62000, monto2026: 78000, ped2025: 1100, ped2026: 1300, prod2025: 1350, prod2026: 1700 }, { country: "México", monto2025: 17000, monto2026: 25000, ped2025: 290, ped2026: 420, prod2025: 340, prod2026: 510 }, { country: "Colombia", monto2025: 11000, monto2026: 16000, ped2025: 210, ped2026: 300, prod2025: 250, prod2026: 360 }]
            },
            "Curso Asincrónico": {
                clientes: [{ country: "Chile", t2025: 600, t2026: 750, n2025: 300, n2026: 400, r2025: 300, r2026: 350 }, { country: "México", t2025: 180, t2026: 280, n2025: 120, n2026: 190, r2025: 60, r2026: 90 }, { country: "Colombia", t2025: 130, t2026: 200, n2025: 80, n2026: 130, r2025: 50, r2026: 70 }],
                ventas: [{ country: "Chile", monto2025: 28000, monto2026: 38000, ped2025: 550, ped2026: 700, prod2025: 650, prod2026: 850 }, { country: "México", monto2025: 8000, monto2026: 13000, ped2025: 160, ped2026: 250, prod2025: 190, prod2026: 300 }, { country: "Colombia", monto2025: 5000, monto2026: 8000, ped2025: 120, ped2026: 180, prod2025: 140, prod2026: 220 }]
            },
            "Acreditación Internacional": {
                clientes: [{ country: "Chile", t2025: 250, t2026: 380, n2025: 180, n2026: 280, r2025: 70, r2026: 100 }, { country: "México", t2025: 60, t2026: 110, n2025: 45, n2026: 80, r2025: 15, r2026: 30 }, { country: "Colombia", t2025: 40, t2026: 75, n2025: 30, n2026: 55, r2025: 10, r2026: 20 }],
                ventas: [{ country: "Chile", monto2025: 42000, monto2026: 65000, ped2025: 240, ped2026: 370, prod2025: 250, prod2026: 380 }, { country: "México", monto2025: 10000, monto2026: 18000, ped2025: 55, ped2026: 100, prod2025: 60, prod2026: 110 }, { country: "Colombia", monto2025: 6500, monto2026: 12000, ped2025: 38, ped2026: 70, prod2025: 40, prod2026: 75 }]
            },
            "Sesiones Magistrales": {
                clientes: [{ country: "Chile", t2025: 350, t2026: 420, n2025: 200, n2026: 250, r2025: 150, r2026: 170 }, { country: "México", t2025: 90, t2026: 140, n2025: 60, n2026: 95, r2025: 30, r2026: 45 }, { country: "Colombia", t2025: 65, t2026: 100, n2025: 40, n2026: 65, r2025: 25, r2026: 35 }],
                ventas: [{ country: "Chile", monto2025: 10500, monto2026: 14000, ped2025: 330, ped2026: 400, prod2025: 350, prod2026: 420 }, { country: "México", monto2025: 2700, monto2026: 4500, ped2025: 85, ped2026: 130, prod2025: 90, prod2026: 140 }, { country: "Colombia", monto2025: 1800, monto2026: 3000, ped2025: 60, ped2026: 95, prod2025: 65, prod2026: 100 }]
            },
            "Especialización": {
                clientes: [{ country: "Chile", t2025: 600, t2026: 750, n2025: 250, n2026: 350, r2025: 350, r2026: 400 }, { country: "México", t2025: 150, t2026: 230, n2025: 100, n2026: 150, r2025: 50, r2026: 80 }, { country: "Colombia", t2025: 110, t2026: 150, n2025: 70, n2026: 100, r2025: 40, r2026: 50 }],
                ventas: [{ country: "Chile", monto2025: 35000, monto2026: 45000, ped2025: 550, ped2026: 680, prod2025: 700, prod2026: 900 }, { country: "México", monto2025: 10000, monto2026: 14000, ped2025: 130, ped2026: 190, prod2025: 160, prod2026: 250 }, { country: "Colombia", monto2025: 6000, monto2026: 9000, ped2025: 100, ped2026: 140, prod2025: 120, prod2026: 180 }]
            },
            "Diplomado": {
                clientes: [{ country: "Chile", t2025: 1400, t2026: 1800, n2025: 600, n2026: 850, r2025: 800, r2026: 950 }, { country: "México", t2025: 350, t2026: 550, n2025: 220, n2026: 360, r2025: 130, r2026: 190 }, { country: "Colombia", t2025: 260, t2026: 380, n2025: 170, n2026: 250, r2025: 90, r2026: 130 }],
                ventas: [{ country: "Chile", monto2025: 180000, monto2026: 230000, ped2025: 1300, ped2026: 1700, prod2025: 1400, prod2026: 1900 }, { country: "México", monto2025: 45000, monto2026: 68000, ped2025: 320, ped2026: 500, prod2025: 350, prod2026: 560 }, { country: "Colombia", monto2025: 30000, monto2026: 46000, ped2025: 240, ped2026: 350, prod2025: 270, prod2026: 400 }]
            },
            "Postítulo": {
                clientes: [{ country: "Chile", t2025: 300, t2026: 420, n2025: 150, n2026: 220, r2025: 150, r2026: 200 }, { country: "México", t2025: 70, t2026: 120, n2025: 45, n2026: 80, r2025: 25, r2026: 40 }, { country: "Colombia", t2025: 50, t2026: 80, n2025: 30, n2026: 50, r2025: 20, r2026: 30 }],
                ventas: [{ country: "Chile", monto2025: 48000, monto2026: 68000, ped2025: 280, ped2026: 400, prod2025: 300, prod2026: 420 }, { country: "México", monto2025: 11000, monto2026: 19000, ped2025: 65, ped2026: 110, prod2025: 70, prod2026: 120 }, { country: "Colombia", monto2025: 7500, monto2026: 12000, ped2025: 45, ped2026: 75, prod2025: 50, prod2026: 80 }]
            }
        };

        // ... El resto de las funciones de lógica y componentes (Badge, KpiCard, Dashboard, etc.)
        // [Inserta aquí todas las funciones que tienes en el archivo .jsx]
        
        function aggregatePrograms(programList) {
          const result = { clientes: [], ventas: [] };
          COUNTRIES.forEach(country => {
            const cAgg = { country, t2025: 0, t2026: 0, n2025: 0, n2026: 0, r2025: 0, r2026: 0 };
            const vAgg = { country, monto2025: 0, monto2026: 0, ped2025: 0, ped2026: 0, prod2025: 0, prod2026: 0 };
            programList.forEach(prog => {
              const cd = programData[prog]?.clientes.find(c => c.country === country);
              const vd = programData[prog]?.ventas.find(v => v.country === country);
              if (cd) { cAgg.t2025 += cd.t2025; cAgg.t2026 += cd.t2026; cAgg.n2025 += cd.n2025; cAgg.n2026 += cd.n2026; cAgg.r2025 += cd.r2025; cAgg.r2026 += cd.r2026; }
              if (vd) { vAgg.monto2025 += vd.monto2025; vAgg.monto2026 += vd.monto2026; vAgg.ped2025 += vd.ped2025; vAgg.ped2026 += vd.ped2026; vAgg.prod2025 += vd.prod2025; vAgg.prod2026 += vd.prod2026; }
            });
            result.clientes.push(cAgg);
            result.ventas.push(vAgg);
          });
          return result;
        }

        const pct = (a, b) => (b && a ? (((a - b) / b) * 100).toFixed(1) : "0.0");
        const fmt = (n) => {
          if (n >= 1000000) return `${(n / 1000000).toFixed(1)}M`;
          if (n >= 1000) return `${(n / 1000).toFixed(1)}K`;
          return n?.toLocaleString?.() ?? n;
        };

        const Badge = ({ value }) => {
          const v = parseFloat(value);
          const color = v >= 0 ? COLORS.positive : COLORS.negative;
          return (
            <span style={{ fontSize: 11, fontWeight: 700, color, background: v >= 0 ? "#34d39918" : "#f8717118", padding: "2px 7px", borderRadius: 4, marginLeft: 6, fontFamily: "'JetBrains Mono', monospace" }}>
              {v >= 0 ? "+" : ""}{value}%
            </span>
          );
        };

        const CustomTooltip = ({ active, payload, label }) => {
          if (!active || !payload?.length) return null;
          return (
            <div style={{ background: "#13152aee", border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "10px 14px", fontSize: 12, color: COLORS.text, backdropFilter: "blur(8px)" }}>
              <div style={{ fontWeight: 700, marginBottom: 6 }}>{label}</div>
              {payload.map((p, i) => (
                <div key={i} style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 2 }}>
                  <span style={{ width: 8, height: 8, borderRadius: 2, background: p.color, display: "inline-block" }} />
                  <span style={{ color: COLORS.textMuted }}>{p.name}:</span>
                  <span style={{ fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>{fmt(p.value)}</span>
                </div>
              ))}
            </div>
          );
        };

        const SectionTitle = ({ children, sub }) => (
          <div style={{ marginBottom: 16, marginTop: 32 }}>
            <h2 style={{ fontSize: 18, fontWeight: 800, color: COLORS.text, letterSpacing: "-0.02em", margin: 0, fontFamily: "'DM Sans', sans-serif" }}>{children}</h2>
            {sub && <p style={{ fontSize: 12, color: COLORS.textMuted, margin: "4px 0 0", fontFamily: "'DM Sans', sans-serif" }}>{sub}</p>}
          </div>
        );

        const KpiCard = ({ label, val2025, val2026, prefix = "", isCurrency }) => {
          const change = pct(val2026, val2025);
          return (
            <div style={{ background: COLORS.card, borderRadius: 10, padding: "16px 20px", border: `1px solid ${COLORS.border}`, flex: 1, minWidth: 140 }}>
              <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: "0.05em", fontWeight: 600, fontFamily: "'DM Sans', sans-serif" }}>{label}</div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginTop: 8 }}>
                <span style={{ fontSize: 24, fontWeight: 800, color: COLORS.text, fontFamily: "'JetBrains Mono', monospace", letterSpacing: "-0.02em" }}>{prefix}{isCurrency ? fmt(val2026) : val2026?.toLocaleString()}</span>
                <Badge value={change} />
              </div>
              <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 4, fontFamily: "'JetBrains Mono', monospace" }}>vs {prefix}{isCurrency ? fmt(val2025) : val2025?.toLocaleString()} (2025)</div>
            </div>
          );
        };

        const ChartCard = ({ title, children }) => (
          <div style={{ background: COLORS.card, borderRadius: 12, padding: 20, border: `1px solid ${COLORS.border}`, flex: "1 1 calc(50% - 10px)", minWidth: 340 }}>
            <h3 style={{ fontSize: 13, fontWeight: 700, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 16, fontFamily: "'DM Sans', sans-serif" }}>{title}</h3>
            {children}
          </div>
        );

        const YoYBarChart = ({ data, yPrefix = "" }) => (
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={data} barGap={4} barCategoryGap="25%">
              <CartesianGrid strokeDasharray="3 3" stroke={COLORS.border} vertical={false} />
              <XAxis dataKey="country" tick={{ fill: COLORS.textMuted, fontSize: 12 }} axisLine={false} tickLine={false} />
              <YAxis tick={{ fill: COLORS.textMuted, fontSize: 11 }} axisLine={false} tickLine={false} tickFormatter={v => `${yPrefix}${fmt(v)}`} />
              <Tooltip content={<CustomTooltip />} />
              <Legend wrapperStyle={{ fontSize: 11 }} />
              <Bar dataKey="Ene-Feb 2025" fill={COLORS.y2025} radius={[4, 4, 0, 0]} />
              <Bar dataKey="Ene-Feb 2026" fill={COLORS.y2026} radius={[4, 4, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        );

        const VIEW_MODES = [
          { key: "consolidated", label: "Consolidado" },
          { key: "modalidad", label: "Por Modalidad" },
          ...PROGRAM_TYPES.map(p => ({ key: p, label: p })),
        ];

        function Dashboard() {
          const [activeView, setActiveView] = useState("consolidated");

          const viewData = useMemo(() => {
            if (activeView === "consolidated") return { main: aggregatePrograms(PROGRAM_TYPES), label: "Consolidado" };
            if (activeView === "modalidad") return { sync: aggregatePrograms(PROGRAM_TYPES.filter(p => MODALIDAD_MAP[p] === "Sincrónico")), async: aggregatePrograms(PROGRAM_TYPES.filter(p => MODALIDAD_MAP[p] === "Asincrónico")), label: "Modalidad" };
            return { main: programData[activeView], label: activeView };
          }, [activeView]);

          const buildChartData = (source) => {
            const cTotal = source.clientes.map(d => ({ country: d.country, "Ene-Feb 2025": d.t2025, "Ene-Feb 2026": d.t2026 }));
            const cStacked = source.clientes.map(d => ({ country: d.country, "Nuevos 2025": d.n2025, "Recurrentes 2025": d.r2025, "Nuevos 2026": d.n2026, "Recurrentes 2026": d.r2026 }));
            const vMonto = source.ventas.map(d => ({ country: d.country, "Ene-Feb 2025": d.monto2025, "Ene-Feb 2026": d.monto2026 }));
            const vPedidos = source.ventas.map(d => ({ country: d.country, "Ene-Feb 2025": d.ped2025, "Ene-Feb 2026": d.ped2026 }));
            const vProductos = source.ventas.map(d => ({ country: d.country, "Ene-Feb 2025": d.prod2025, "Ene-Feb 2026": d.prod2026 }));
            const sumC = source.clientes.reduce((a, d) => ({ t25: a.t25 + d.t2025, t26: a.t26 + d.t2026, n25: a.n25 + d.n2025, n26: a.n26 + d.n2026 }), { t25: 0, t26: 0, n25: 0, n26: 0 });
            const sumV = source.ventas.reduce((a, d) => ({ m25: a.m25 + d.monto2025, m26: a.m26 + d.monto2026, p25: a.p25 + d.ped2025, p26: a.p26 + d.ped2026, pr25: a.pr25 + d.prod2025, pr26: a.pr26 + d.prod2026 }), { m25: 0, m26: 0, p25: 0, p26: 0, pr25: 0, pr26: 0 });
            const tk25 = sumV.p25 ? sumV.m25 / sumV.p25 : 0;
            const tk26 = sumV.p26 ? sumV.m26 / sumV.p26 : 0;
            const ticket = source.ventas.map(d => ({ country: d.country, "Ene-Feb 2025": d.ped2025 ? Math.round(d.monto2025 / d.ped2025 * 100) / 100 : 0, "Ene-Feb 2026": d.ped2026 ? Math.round(d.monto2026 / d.ped2026 * 100) / 100 : 0 }));
            return { cTotal, cStacked, vMonto, vPedidos, vProductos, ticket, sumC, sumV, tk25, tk26 };
          };

          const renderMetricBlock = (source, titlePrefix = "") => {
            const d = buildChartData(source);
            return (
              <React.Fragment>
                <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 8 }}>
                  <KpiCard label="Clientes Totales" val2025={d.sumC.t25} val2026={d.sumC.t26} />
                  <KpiCard label="Ventas (USD)" val2025={d.sumV.m25} val2026={d.sumV.m26} prefix="$" isCurrency />
                  <KpiCard label="Ticket Promedio" val2025={Math.round(d.tk25 * 100) / 100} val2026={Math.round(d.tk26 * 100) / 100} prefix="$" />
                </div>
                <SectionTitle sub="Comparativo YoY">Gráficos de Desempeño</SectionTitle>
                <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                  <ChartCard title="Ventas por País"><YoYBarChart data={d.vMonto} yPrefix="$" /></ChartCard>
                  <ChartCard title="Pedidos Totales"><YoYBarChart data={d.vPedidos} /></ChartCard>
                </div>
              </React.Fragment>
            );
          };

          return (
            <div style={{ background: COLORS.bg, minHeight: "100vh", color: COLORS.text, fontFamily: "'DM Sans', sans-serif", padding: "24px 28px" }}>
              <div style={{ marginBottom: 20 }}>
                <h1 style={{ fontSize: 28, fontWeight: 800, margin: "0 0 4px", letterSpacing: "-0.03em" }}>Dashboard Ene-Feb 2026</h1>
                <p style={{ fontSize: 13, color: COLORS.textMuted }}>Vista: {activeView.toUpperCase()}</p>
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 24 }}>
                  {VIEW_MODES.map(v => (
                    <button key={v.key} onClick={() => setActiveView(v.key)} style={{
                        background: activeView === v.key ? COLORS.accent : "transparent",
                        color: "#fff", border: `1px solid ${COLORS.border}`, borderRadius: 6, padding: "6px 12px", cursor: "pointer"
                    }}>{v.label}</button>
                  ))}
              </div>
              {activeView !== "modalidad" ? renderMetricBlock(viewData.main) : <div>Vista modalidad activa</div>}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
